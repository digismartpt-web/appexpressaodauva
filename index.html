<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://apis.google.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <title>AppClickandCollect</title>
  <script>
    // Rapporteur d'erreur professionnel
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      const errorBox = document.createElement('div');
      errorBox.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:sans-serif;font-size:14px;';
      errorBox.innerHTML = '<strong>❌ Erreur de Production détectée :</strong><br>' + msg + '<br>Fichier: ' + url + ' (Ligne: ' + lineNo + ')';
      document.body.appendChild(errorBox);
      return false;
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
